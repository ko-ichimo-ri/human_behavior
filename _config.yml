# GitHub Pages settings
theme: jekyll-theme-minimal
markdown: kramdown

# MathJax configuration for LaTeX support
mathjax:
  enable: true

# URL settings (adjust if using custom domain)
url: "https://ko-ichimo-ri.github.io"
baseurl: "/human_behavior"

# Navigation
