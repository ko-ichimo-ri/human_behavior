title: Human Behavior
description: Understanding Human Behavior / 人間行動を理解する
author: ko-ichimo-ri
email: your-email@example.com

# GitHub Pages settings
theme: jekyll-theme-minimal
markdown: kramdown

# URL settings (adjust if using custom domain)
url: "https://ko-ichimo-ri.github.io"
baseurl: "/human_behavior"

# Navigation
include:
  - _pages

exclude:
  - README.md.bak
  - LICENSE
  - .gitignore
  - /build
  - /node_modules
  - .github

# Jekyll settings
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Collections
collections:
  chapters:
    output: true
    permalink: /:collection/:name/
